name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências e Sincronizar
        run: |
          # Entra na pasta onde o package.json realmente está
          cd drivers_final
          npm install --force
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gerar APK Real
        run: |
          # Entra na pasta android que está dentro de drivers_final
          cd drivers_final/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drivers-Friend-APK
          path: "**/build/outputs/apk/release/*.apk"
          
