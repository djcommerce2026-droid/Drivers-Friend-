name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências (npm)
        run: |
          npm install --force
          # Garante que o Capacitor atualize a pasta Android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gerar APK Real
        run: |
          # Entra na pasta do Android e liga o motor
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drivers-Friend-APK
          path: "android/app/build/outputs/apk/release/*.apk"
          
