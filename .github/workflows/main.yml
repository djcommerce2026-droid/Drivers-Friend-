name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Encontrar e Buildar
        run: |
          # Procura onde está o arquivo gradlew e entra na pasta dele
          GRADLEW_PATH=$(find . -name gradlew)
          GRADLE_DIR=$(dirname $GRADLEW_PATH)
          cd $GRADLE_DIR
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/app-release-unsigned.apk"
