name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Encontrar e Buildar
        run: |
          # Pega apenas o primeiro gradlew que encontrar, ignorando pastas de SDK
          GRADLEW_PATH=$(find . -name gradlew | grep -v "android-sdk" | head -n 1)
          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          echo "Entrando na pasta: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/outputs/apk/release/*.apk"

