name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle Manualmente
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Buildar o APK Real
        run: |
          # Encontra a pasta onde está o arquivo build.gradle do seu app
          GRADLE_DIR=$(find . -name build.gradle -not -path "*/node_modules/*" -not -path "*/android-sdk/*" | head -n 1 | xargs dirname)
          echo "Pasta do projeto encontrada: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          
          # Tenta buildar usando o Gradle do sistema, ignorando o wrapper quebrado
          gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/outputs/apk/release/*.apk"
          
