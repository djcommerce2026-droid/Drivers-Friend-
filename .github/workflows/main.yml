name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Encontrar e Buildar
        run: |
          # Procura a pasta que contém o arquivo build.gradle do Android
          GRADLE_DIR=$(find . -name build.gradle -not -path "*/node_modules/*" -not -path "*/android-sdk/*" | head -n 1 | xargs dirname)
          echo "Pasta encontrada: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          # Comando bruto para forçar o build
          gradle assembleRelease --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/outputs/apk/release/*.apk"
