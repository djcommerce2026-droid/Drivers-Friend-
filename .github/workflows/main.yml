name: Build Drivers Friend APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Limpar e Configurar Gradle
        run: |
          # Procura a pasta que tem o arquivo build.gradle
          export PROJECT_DIR=$(find . -name build.gradle -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Projeto encontrado em: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          # Instala um wrapper novo para não depender do que está quebrado
          gradle wrapper
          chmod +x gradlew

      - name: Gerar APK
        run: |
          export PROJECT_DIR=$(find . -name build.gradle -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$PROJECT_DIR"
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drivers-Friend-APK
          path: "**/build/outputs/apk/release/*.apk"
          
