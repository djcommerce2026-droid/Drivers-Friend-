apply plugin: 'com.android.application'
android { namespace 'com.drivers.friend'; compileSdk 34
defaultConfig { applicationId 'com.drivers.friend'; minSdkVersion 23; targetSdk 34; versionCode 1; versionName '1.0'; testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner' }
buildTypes { release { minifyEnabled false; proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro' } }
configurations.all { resolutionStrategy { force 'androidx.core:core:1.13.0'; force 'androidx.core:core-ktx:1.13.0'; force 'androidx.appcompat:appcompat:1.6.1' } } }
dependencies { implementation fileTree(include: ['*.jar'], dir: 'libs')
implementation 'androidx.appcompat:appcompat:1.6.1'
implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
implementation 'androidx.core:core-splashscreen:1.0.1'
implementation project(':capacitor-android')
implementation project(':capacitor-cordova-android-plugins') }
apply from: 'capacitor.build.gradle'
